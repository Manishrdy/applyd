{% extends "admin/_layout.html" %}
{% set admin_page_title = "Admin · Not found" %}

{% block admin_body %}
<section class="card p-8 text-center space-y-3">
  <div class="inline-flex h-12 w-12 items-center justify-center rounded-full bg-surface-muted text-text-subtle">
    <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/>
      <path d="m21 21-4.3-4.3"/>
    </svg>
  </div>
  <h1 class="text-xl font-semibold tracking-tight">Admin page not found</h1>
  <p class="text-text-muted text-sm">
    <code class="font-mono" x-text="''">{{ path }}</code> doesn't match any registered admin route.
  </p>
  <div class="pt-2">
    <a href="/admin" class="btn btn-secondary btn-sm">Back to overview</a>
  </div>
</section>
{% endblock %}
