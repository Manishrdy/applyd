name: Sync ATS Company Catalogs

on:
  schedule:
    - cron: "0 16 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync ATS company catalogs
        run: |
          cd dashboard
          uv sync
          uv run python -m app.cli sync-company-catalogs

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: sync ATS company catalogs from upstream"
          title: "chore: sync ATS company catalogs from upstream"
          body: |
            Automated update of vendored ATS company catalogs from upstream.

            Source:
            - repo: kalil0321/ats-scrapers
            - ref: main
          branch: codex/sync-ats-company-catalogs
          delete-branch: true

